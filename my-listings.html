<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Listings | Rageo Rentals</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f6fa;
  margin:0;
}

header{
  background:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

header img{
  height:55px;
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:15px;
}

.top-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.add-btn{
  background:#28a745;
  color:white;
  text-decoration:none;
  padding:12px 18px;
  border-radius:6px;
  font-weight:bold;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
  display:flex;
  flex-wrap:wrap;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
  width:280px;
  height:200px;
  object-fit:cover;
}

.info{
  flex:1;
  padding:15px;
}

.info h3{
  margin-top:0;
}

.price{
  color:#28a745;
  font-weight:bold;
  font-size:1.2em;
}

.actions{
  margin-top:15px;
}

.actions a,
.actions button{
  padding:10px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:8px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.view-btn{
  background:#007bff;
}

.delete-btn{
  background:#dc3545;
}
  document
.querySelectorAll(".edit-btn")
.forEach(btn => {

btn.addEventListener("click", async () => {

const id = btn.dataset.id;

const title = prompt(
"Edit title:",
btn.dataset.title
);

if(title === null) return;

const location = prompt(
"Edit location:",
btn.dataset.location
);

if(location === null) return;

const price = prompt(
"Edit price:",
btn.dataset.price
);

if(price === null) return;

const description = prompt(
"Edit description:",
btn.dataset.description
);

if(description === null) return;

try{

await updateDoc(
doc(db,"listings",id),
{
title,
location,
price,
description
}
);

alert("Property updated successfully.");

loadListings(auth.currentUser.email);

}
catch(err){

console.error(err);

alert("Failed to update property.");

}

});

});

.logout-btn{
  background:#dc3545;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

.empty{
  text-align:center;
  padding:50px;
  background:white;
  border-radius:10px;
}

@media(max-width:768px){

.card{
  flex-direction:column;
}

.card img{
  width:100%;
}
}
</style>
</head>
<body>

<header>

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.jpg" alt="Logo">
<h2>My Listings</h2>
</div>

<div id="userInfo"></div>

</header>

<div class="container">

<div class="top-actions">

<h2>Your Properties</h2>

<a href="add-listing.html" class="add-btn">
➕ Add New Listing
</a>

</div>

<div id="listingsContainer">

<p>Loading listings...</p>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBOoGvZDvzp-CHLVllJAujTdo84vxcz_hM",
authDomain: "rageo-rentals.firebaseapp.com",
projectId: "rageo-rentals"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const listingsContainer =
document.getElementById("listingsContainer");

const userInfo =
document.getElementById("userInfo");

onAuthStateChanged(auth, async (user)=>{

if(!user){

window.location.href="login.html";
return;

}

userInfo.innerHTML=`
${user.email}
<button class="logout-btn" id="logoutBtn">
Logout
</button>
`;

document.getElementById("logoutBtn")
.onclick=()=>{

signOut(auth)
.then(()=>window.location.href="login.html");

};

loadListings(user.email);

});

async function loadListings(email){

listingsContainer.innerHTML="Loading...";

try{

const q=query(
collection(db,"listings"),
where("user","==",email)
);

const snapshot=await getDocs(q);

if(snapshot.empty){

listingsContainer.innerHTML=`
<div class="empty">

<h3>No properties uploaded yet</h3>

<p>
Click Add New Listing to post your first property.
</p>

</div>
`;

return;

}

listingsContainer.innerHTML="";

snapshot.forEach(docSnap=>{

const data=docSnap.data();

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${data.images?.[0] || 'logo.jpg'}">

<div class="info">

<h3>${data.title || ""}</h3>

<p>${data.location || ""}</p>

<div class="price">
${data.price || ""}
</div>

<div class="actions">

<button
class="view-btn edit-btn"
data-id="${docSnap.id}"
data-title="${data.title || ''}"
data-location="${data.location || ''}"
data-price="${data.price || ''}"
data-description="${data.description || ''}">
Edit
</button>

<button
class="delete-btn"
data-id="${docSnap.id}">
Delete
</button>

</div>

</div>
`;

listingsContainer.appendChild(card);

});

document
.querySelectorAll(".delete-btn")
.forEach(btn=>{

btn.addEventListener("click",async()=>{

const id=btn.dataset.id;

const confirmDelete=
confirm(
"Delete this property permanently?"
);

if(!confirmDelete) return;

try{

await deleteDoc(
doc(db,"listings",id)
);

btn.closest(".card").remove();

alert("Property deleted.");

}
catch(err){

console.error(err);

alert(
"Failed to delete property."
);

}

});

});

}
catch(err){

console.error(err);

listingsContainer.innerHTML=
"<p>Error loading listings.</p>";

}

}

</script>

</body>
</html>
